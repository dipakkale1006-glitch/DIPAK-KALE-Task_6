<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Section -->
    <div class="left">
        <img src="https://static.vecteezy.com/system/resources/previews/026/721/193/non_2x/washing-machine-and-laundry-laundry-sticker-png.png" alt="Laundry Image">
    </div>

    <!-- Right Section -->
    <div class="right">
        <div class="form-box">
            <h1>Hello Again!</h1>
            <p>Welcome back! we missed you!</p>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Email@site.com">

                <label>Password</label>
                <input type="password" placeholder="Password">

                <a href="#" class="forgot">Forgot Password</a>

                <button type="submit">Login</button>
            </form>

            <p class="register">Not a member? <span>Register Now</span></p>
        </div>
    </div>

</div>

</body>
</html>
